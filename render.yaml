services:
  # Backend API
  - type: web
    name: supply-chain-api
    runtime: node
    region: oregon
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /tmp/supply_chain.db
      - key: FRONTEND_URL
        value: https://supply-chain-app.onrender.com

  # Frontend App
  - type: web
    name: supply-chain-app
    runtime: static
    buildCommand: ""
    staticPublishPath: frontend
