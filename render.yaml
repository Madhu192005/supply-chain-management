services:
  # Backend API
  - type: web
    name: supply-chain-api
    env: node
    region: oregon
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /data/sqlite/supply_chain.db
      - key: FRONTEND_URL
        value: https://supply-chain-app.onrender.com
    disk:
      name: sqlite-data
      mountPath: /data/sqlite
      sizeGB: 1

  # Frontend App
  - type: web
    name: supply-chain-app
    env: static
    buildCommand: ""
    staticPublishPath: frontend
