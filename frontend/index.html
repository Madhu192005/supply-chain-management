<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supply Chain — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>📦 SupplyChain</h1>
      <p>Sign in to your account</p>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="admin@supply.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>

      <button class="btn btn-primary" onclick="login()">Sign In</button>
      <p class="error-msg" id="error"></p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      const role = localStorage.getItem('role');
      window.location.href = role === 'admin' ? 'admin.html' : 'manager.html';
    }

    async function login() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const error    = document.getElementById('error');

      if (!email || !password) {
        error.textContent = 'Please fill in all fields';
        return;
      }

      const res = await api.login(email, password);

      if (res.token) {
        localStorage.setItem('token', res.token);
        localStorage.setItem('role',  res.user.role);
        localStorage.setItem('name',  res.user.name);

        if (res.user.role === 'admin') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'manager.html';
        }
      } else {
        error.textContent = res.message || 'Login failed';
      }
    }

    // Allow Enter key
    document.addEventListener('keypress', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
